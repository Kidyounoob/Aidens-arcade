<!DOCTYPE html>
<html lang="en" data-mode="dark" data-theme="darkwater">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal • Aiden’s Arcade</title>

  <link rel="stylesheet" href="../styles.css?v=2" />
  <script defer src="../app.js?v=2"></script>
  <script defer src="./portal.js?v=2"></script>
</head>

<body>
  <header>
    <div class="container nav">
      <a class="brand" href="../">🌊 Aiden’s <span class="accent">Arcade</span></a>
      <nav class="links">
        <a class="link" href="../games/">Games</a>
        <a class="link" href="./" aria-current="true">Portal</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="section container">
      <div class="head">
        <h2>Web Portal</h2>
        <p>High-speed private proxy enabled.</p>
      </div>

      <div class="card" style="padding: 14px; margin-bottom: 12px;">
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <input class="input" id="portalInput" placeholder="https://example.com" style="flex: 1" />
          <button class="btn primary" id="portalGo" type="button">Go</button>
          <button class="btn" id="portalClear" type="button">Clear</button>
        </div>
        <p class="sub tiny" id="portalMsg" style="margin-top: 10px; color: var(--accent);"></p>
      </div>

      <div class="card" style="padding: 0; overflow: hidden; background: #000;">
        <div class="ratio" style="position: relative; padding-bottom: 70%; height: 0;">
          <!-- IMPORTANT: start on /go so the SW + UV encoding happens on the proxy origin -->
          <iframe
            id="portalFrame"
            src="https://fast-proxy.happydumbjunkday.workers.dev/go?url=https%3A%2F%2Fexample.com"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
            loading="lazy"
            referrerpolicy="no-referrer"
            allow="fullscreen; clipboard-read; clipboard-write"
          ></iframe>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
